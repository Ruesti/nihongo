name: nihongo_app
description: "Nihongo — Japanisch lernen. Echter Lerneffekt statt Gamification."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # SRS & Storage
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Audio
  flutter_tts: ^4.2.2
  speech_to_text: ^7.0.0
  just_audio: ^0.9.42

  # Network
  http: ^1.2.2

  # UI
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1

  # Sensors (optional Shake-to-shuffle)
  sensors_plus: ^6.1.1

  # IAP
  purchases_flutter: ^8.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/kanji_svg/
